<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paises</title>
</head>
<body>
    <h1>Teste de Nacionalidade</h1>
    <p id="mensagem"></p>

        <script>
            var pais = 'Brasil';
            let mensagem = `Vivendo em ${pais}<br>`;
            if (pais == 'Brasil') {
                mensagem += ('Você é Brasileiro!')
            } else {
                mensagem += ('Você é Estrangeiro!')
            }
            document.getAnimations('mensagem').innerHTML = mensagem;
        </script>
</body>
</html>
